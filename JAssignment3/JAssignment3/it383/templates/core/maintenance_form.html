<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Add Maintenance Record</title>
</head>
<body class="container mt-5">
    <h1>🛠️ Add Maintenance Record</h1>
    <h5 class="text-muted mb-4">Asset: <strong>{{ asset.name }}</strong> ({{ asset.serial_number }})</h5>

    <div class="card">
        <div class="card-header bg-warning text-dark">Log a Repair / Service</div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3" required
                        placeholder="e.g. Replaced power supply unit"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Service Date</label>
                    <input type="date" name="service_date" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Cost ($)</label>
                    <input type="number" name="cost" step="0.01" min="0" class="form-control" required
                        placeholder="e.g. 150.00">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning">💾 Save Record</button>
                    <a href="/assets/" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
